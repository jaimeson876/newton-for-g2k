<!DOCTYPE html>
<html>
  <head><meta charset="utf-8" /></head>
  <body>
    <!-- Static form stub for Netlify's build-time crawler to discover the form. -->
    <!-- The actual submission is handled by React in /reach-out via fetch. -->
    <form name="reach-out" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="reach-out" />
      <input name="bot-field" type="text" />
      <input name="name" type="text" />
      <input name="email" type="email" />
      <input name="organisation" type="text" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
