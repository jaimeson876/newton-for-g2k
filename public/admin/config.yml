backend:
  name: git-gateway
  branch: main

# Where uploaded media (images) are stored
media_folder: public/images/letters
public_folder: /images/letters

# Slug format: YYYY-MM-DD-title-slug
slug:
  encoding: "ascii"
  clean_accents: true

collections:
  - name: "letters"
    label: "Letters & Articles"
    label_singular: "Letter"
    folder: "content/letters"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "/letters/{{slug}}"
    fields:
      - { label: "Title",        name: "title",    widget: "string" }
      - { label: "Publish Date", name: "date",     widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Excerpt",      name: "excerpt",  widget: "text",     hint: "Short summary shown on the letters listing page." }
      - { label: "Featured Image", name: "image",  widget: "image",    required: false, hint: "Optional. Shown at the top of the article." }
      - { label: "Body",         name: "body",     widget: "markdown" }
